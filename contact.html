<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Tailor Marketplace</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <i class="fas fa-scissors"></i>
        <h1>Tailor <span>Contact</span></h1>
      </div>
    </header>

    <section class="view">
      <div class="section-header">
        <h2><i class="fas fa-id-card"></i> ติดต่อเรา</h2>
        <p>หากมีข้อสงสัยหรือต้องการสอบถามเพิ่มเติม</p>
      </div>

      <div class="form-group">
        <div class="input-item">
          <label><i class="fas fa-map-marker-alt"></i> ที่อยู่ร้าน</label>
          <p style="font-size: 14px;">123 ถนนสุขุมวิท แขวงคลองเตย เขตคลองเตย กรุงเทพฯ 10110</p>
        </div>
        <div class="input-item">
          <label><i class="fas fa-phone"></i> เบอร์โทรศัพท์</label>
          <p style="font-size: 14px;">02-123-4567, 081-234-5678</p>
        </div>
        <div class="input-item">
          <label><i class="fab fa-line"></i> Line ID</label>
          <p style="font-size: 14px;">@tailor_marketplace</p>
        </div>
        <div class="input-item">
          <label><i class="fas fa-clock"></i> เวลาทำการ</label>
          <p style="font-size: 14px;">จันทร์ - เสาร์: 09:00 - 18:00 น.</p>
        </div>
        <button class="btn-primary" onclick="window.open('https://line.me', '_blank')">
          <i class="fab fa-line"></i> แชทผ่าน Line
        </button>
      </div>
    </section>

    <div class="bottom-nav">
      <div class="nav-item" onclick="location.href='index.html'">
        <i class="fas fa-home"></i>
        <span>หน้าหลัก</span>
      </div>
      <div class="nav-item" onclick="location.href='portfolio.html'">
        <i class="fas fa-images"></i>
        <span>ผลงาน</span>
      </div>
      <div class="nav-item active" onclick="location.href='contact.html'">
        <i class="fas fa-phone"></i>
        <span>ติดต่อ</span>
      </div>
    </div>
  </div>
</body>
</html>
